name: Release

on:
  push:
    branches: [main, master]
    paths:
      - 'package.json'

jobs:
  check-version:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v$(node -p "require('./package.json').version")" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'false'
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install global build tools
        run: |
          npm install -g cmake-js
          npm install -g @electron/rebuild

      - name: Install dependencies (skip native build)
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild
        env:
          npm_config_cmake_js_G: "Visual Studio 17 2022"

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Package for Windows x64
        run: npm run package -- --arch=x64 --platform=win32

      - name: Create release zip
        run: |
          Compress-Archive -Path "out\Resonate-win32-x64\*" -DestinationPath "Resonate-${{ needs.check-version.outputs.version }}-win32-x64.zip"
        shell: pwsh

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.check-version.outputs.version }}
          git push origin ${{ needs.check-version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: Resonate ${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            Resonate-${{ needs.check-version.outputs.version }}-win32-x64.zip
