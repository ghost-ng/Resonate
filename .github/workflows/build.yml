name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install build tools
        run: npm install -g cmake-js

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_cmake_js_G: "Visual Studio 17 2022"

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Package for Windows x64
        run: npm run package -- --arch=x64 --platform=win32

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Resonate-win32-x64
          path: out/Resonate-win32-x64/
          retention-days: 14
